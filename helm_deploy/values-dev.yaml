---
# Per environment values which override defaults in prisoner-contact-registry/values.yaml
generic-service:
  replicaCount: 2

  ingress:
    host: prisoner-contact-registry-dev.prison.service.justice.gov.uk

  env:
    SPRING_PROFILES_ACTIVE: "stdout"
    HMPPS_AUTH_URL: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    PERSONAL_RELATIONSHIPS_API_URL: https://personal-relationships-api-dev.hmpps.service.justice.gov.uk
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    # Enable Swagger UI and Swagger API docs on Dev
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    APPLICATIONINSIGHTS_STATSBEAT_DISABLED: "true"
    JAVA_TOOL_OPTIONS: "$(JAVA_PROXY_TOOL_OPTIONS) -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=50.0"

  namespace_secrets:
    hmpps-envoy-https-proxy-env:
      HTTP_PROXY: "HTTP_PROXY"
      HTTPS_PROXY: "HTTPS_PROXY"
      NO_PROXY: "NO_PROXY"
      JAVA_PROXY_TOOL_OPTIONS: "JAVA_PROXY_TOOL_OPTIONS"

  scheduledDowntime:
    enabled: true

generic-prometheus-alerts:
  businessHoursOnly: true